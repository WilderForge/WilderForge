name: Sanitize Dependabot Gradle Wrapper PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  sanitize:
    runs-on: self-hosted

    if: >
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.title, 'Bump gradle-wrapper')

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Sanitize Gradle wrapper changes
        run: |
          set -euo pipefail

          BASE_REF="origin/${{ github.base_ref }}"

          # Capture original author (Dependabot)
          AUTHOR_NAME="$(git log -1 --pretty=format:%an)"
          AUTHOR_EMAIL="$(git log -1 --pretty=format:%ae)"

          # Capture original commit subject
          ORIGINAL_SUBJECT="$(git log -1 --pretty=format:%s)"
          NEW_SUBJECT="${ORIGINAL_SUBJECT} (sanitized by wildermods-sanitizer)"

          echo "Original subject: $ORIGINAL_SUBJECT"
          echo "New subject: $NEW_SUBJECT"

          # Get list of changed files in the PR
          git diff --name-only "$BASE_REF"...HEAD > changed_files.txt

          # Revert everything except gradle-wrapper.properties
          while read -r file; do
            if [[ "$(basename "$file")" != "gradle-wrapper.properties" ]]; then
              echo "Reverting $file"
              git checkout "$BASE_REF" -- "$file"
            fi
          done < changed_files.txt

          rm changed_files.txt

          # Exit cleanly if nothing changed
          if git diff --quiet; then
            echo "No changes left after sanitization"
            exit 0
          fi

          # Commit with sanitized committer, preserve Dependabot as author
          git -c user.name="WilderForge Sanitizer[bot]" \
              -c user.email="<>" \
              commit -am "$NEW_SUBJECT" \
              --author="$AUTHOR_NAME <$AUTHOR_EMAIL>"

          git push
